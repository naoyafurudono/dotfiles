# prefix ターミナルアプリのキーバインディングと競合して負けるので一旦無効化
# set-option -g prefix C-j
# unbind C-b

# vi mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# 設定リロード
bind r source-file ~/.config/tmux/tmux.conf

bind -n C-o select-pane -t :.+

# === Plugins (TPM) ===
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# resurrect: Claude Code はプロセス復元の対象外（デフォルトは vim/nvim 等のみ）
# 代わりに復元フックで claude-sessions.txt を読み、各ペインで claude --resume を実行
set -g @resurrect-hook-post-restore-all '~/.config/tmux/claude-session-restore.sh'

# continuum: 自動保存(15分間隔)・自動復元
set -g @continuum-restore 'on'

# TPM の初期化（tmux.conf の末尾に置く）
run '~/.tmux/plugins/tpm/tpm'

