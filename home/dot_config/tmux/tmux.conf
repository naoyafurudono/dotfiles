# Ghostty は macOS Launch Services 経由で起動されるため /opt/homebrew/bin が PATH に無い。
# TPM などの `run-shell` で `tmux` 自体を呼び出せるよう、明示的に PATH を注入する。
set-environment -g PATH "/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"

# prefix: C-Space (Ghosttyが super+* キーで \x00 を送信する)
# C-Space は直接キーボードで押すことがないため、通常入力を奪わない
set-option -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# vi mode (copy-mode内のみ、通常入力には影響しない)
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Ghosttyから呼ばれるキーバインド (prefix + key)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind x confirm-before -p "kill-pane? (y/n)" kill-pane
# zoom トグル後に Claude Code (Ink TUI) の表示崩れを直すため C-l を送る。
# Ghostty の `shift+escape=text:\x00z` から来る Shift-Esc も最終的にこのバインドを叩く。
# C-l は Claude Code ペインに限定して送る:
#   - nvim 等の他アプリで誤発火（nvim では C-l = ウィンドウ右移動）しないため
#   - Claude Code は argv[0] にバージョン文字列 (例: 2.1.121) を書き込むので
#     pane_current_command が *.*.* に一致するかで判別する
# SIGWINCH 起因の再描画が完了する前に C-l を送ると二重描画になりうるので、
# run-shell -b でメインループを塞がずに 50ms 遅延させてから送る。
# pane_id / pane_current_command は bind 評価時に展開されるため、ペインを切り替えても元ペインに届く。
bind z resize-pane -Z \; run-shell -b "sleep 0.05; case '#{pane_current_command}' in *.*.*) tmux send-keys -t '#{pane_id}' C-l ;; esac"
bind = select-layout -E
bind n new-window -c "#{pane_current_path}"
bind N run-shell "open -na Ghostty.app --args --command='/opt/homebrew/bin/tmux new-session -c #{pane_current_path}'"
bind y send-keys C-l

# C-o をアプリケーションに通す（デフォルトではroot tableでペイン切替に使われている）
unbind -T root C-o

# マウス操作（ペイン選択・スクロール・リサイズ）
set -g mouse on

# === 見た目 ===
# ペイン境界線（Atom One Light に合わせたカラー）
set -g pane-border-style "fg=#d0d0d0"
set -g pane-active-border-style "fg=#4078f2"

# ペインボーダーにインデックスとコマンド名を表示
set -g pane-border-status top
set -g pane-border-format ' #{pane_index}: #{pane_current_command} '

# 非アクティブペインの背景を少し暗くする
set -g window-style 'bg=colour254'
set -g window-active-style 'bg=colour231'

# ステータスバー（上部表示）
set -g status-position top
set -g status-interval 2

# 他のウィンドウ・セッションがあるときに背景色で強烈に強調
# - 単一ウィンドウかつ単一セッション: 目立たないグレー
# - 他にウィンドウまたはセッションあり: 赤背景・白太字（うるさいくらい目立たせる）
set -g status-style "#{?#{||:#{>:#{session_windows},1},#{>:#(tmux list-sessions 2>/dev/null | wc -l | tr -d ' '),1}},bg=colour196 fg=colour231 bold,bg=colour254 fg=colour244}"

set -g status-left-length 100
set -g status-left "#{?#{||:#{>:#{session_windows},1},#{>:#(tmux list-sessions 2>/dev/null | wc -l | tr -d ' '),1}},  ⚠  OTHERS EXIST  ⚠  ,}[#S] win #I/#{session_windows} | ses #(tmux list-sessions 2>/dev/null | wc -l | tr -d ' ') "
set -g status-right "#{?#{>:#{session_windows},1},#[reverse] #(tmux list-windows -F '#I:#W' | tr '\\n' ' ') ,}"
set -g status-right-length 100

# === その他 ===
# escキーの遅延をなくす
set -sg escape-time 0

# スクロールバック行数
set -g history-limit 50000

# フォーカスイベントを転送（nvimのautoread等に必要）
set-option -g focus-events on

# Claude Code のリサイズ時表示崩れ対策
# - aggressive-resize off: ペイン切替のたびに SIGWINCH を飛ばさない（崩れ頻度を下げる）
# - allow-passthrough on: アプリのエスケープシーケンスを Ghostty まで通す
set-option -g aggressive-resize off
set-option -g allow-passthrough on

# 256色対応
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# 拡張キー（Cmd / Super 等の修飾キーを内側のアプリ（nvim）まで届ける）
# Ghostty が kitty keyboard protocol で送ってくる CSI u シーケンスを tmux が解釈し、
# 同じく kitty kbp を理解する nvim 0.10+ にそのまま転送する。
set -s extended-keys always
set -s extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'

# シェル
# default-command は設定しない。reattach-to-user-namespace は最近の macOS + tmux 3.x では不要で、
# 未インストールだと default-command 起動失敗 → ペイン即死 → tmux 終了 → Ghostty が即閉じる原因になる。
set -g default-shell /opt/homebrew/bin/fish

# 設定リロード
bind r source-file ~/.config/tmux/tmux.conf

# === Plugins (TPM) ===
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# resurrect: Claude Code はプロセス復元の対象外（デフォルトは vim/nvim 等のみ）
# 代わりに復元フックで claude-sessions.txt を読み、各ペインで claude --resume を実行
set -g @resurrect-hook-post-restore-all '~/.config/tmux/claude-session-restore.sh'

# continuum: 自動保存・自動復元
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

# resurrect: ペインのスクロールバック内容も保存して復元後すぐに読み返せるようにする
set -g @resurrect-capture-pane-contents 'on'

# TPM の初期化（tmux.conf の末尾に置く）
run '~/.tmux/plugins/tpm/tpm'
